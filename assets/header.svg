<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="40%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#020209"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtitleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <style>
      @keyframes twinkle1 { 0%,100%{opacity:.2} 50%{opacity:1} }
      @keyframes twinkle2 { 0%,100%{opacity:.4} 50%{opacity:.9} }
      @keyframes twinkle3 { 0%,100%{opacity:.1} 50%{opacity:.8} }
      @keyframes shoot { 0%{transform:translate(0,0);opacity:1} 70%{opacity:1} 100%{transform:translate(250px,80px);opacity:0} }
      @keyframes pulse { 0%,100%{opacity:.15} 50%{opacity:.35} }
      .s1{animation:twinkle1 3s ease-in-out infinite}
      .s2{animation:twinkle2 4s ease-in-out infinite}
      .s3{animation:twinkle3 5s ease-in-out infinite}
      .s4{animation:twinkle1 2.5s ease-in-out infinite}
      .s5{animation:twinkle2 3.5s ease-in-out infinite}
      .shoot{animation:shoot 6s ease-in infinite}
      .nebula{animation:pulse 8s ease-in-out infinite}
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="10"/>

  <!-- Nebula glow -->
  <ellipse cx="450" cy="110" rx="300" ry="100" fill="url(#glow)" class="nebula"/>

  <!-- Stars - Layer 1 (small, dim) -->
  <circle cx="45" cy="30" r="1" fill="#c9d1d9" class="s1"/>
  <circle cx="120" cy="15" r="0.8" fill="#e2e8f0" class="s2"/>
  <circle cx="200" cy="45" r="1.2" fill="#c9d1d9" class="s3"/>
  <circle cx="310" cy="20" r="0.7" fill="#a78bfa" class="s1"/>
  <circle cx="400" cy="12" r="1" fill="#e2e8f0" class="s4"/>
  <circle cx="500" cy="35" r="0.8" fill="#c9d1d9" class="s2"/>
  <circle cx="580" cy="18" r="1.1" fill="#a78bfa" class="s5"/>
  <circle cx="670" cy="40" r="0.9" fill="#e2e8f0" class="s3"/>
  <circle cx="750" cy="22" r="1" fill="#c9d1d9" class="s1"/>
  <circle cx="830" cy="10" r="0.7" fill="#a78bfa" class="s4"/>
  <circle cx="870" cy="55" r="1.2" fill="#c9d1d9" class="s2"/>

  <!-- Stars - Layer 2 (medium) -->
  <circle cx="80" cy="80" r="1.3" fill="#e2e8f0" class="s3"/>
  <circle cx="160" cy="120" r="1.5" fill="#a78bfa" class="s1"/>
  <circle cx="55" cy="170" r="1" fill="#c9d1d9" class="s5"/>
  <circle cx="130" cy="195" r="1.2" fill="#e2e8f0" class="s2"/>
  <circle cx="780" cy="90" r="1.4" fill="#a78bfa" class="s4"/>
  <circle cx="840" cy="140" r="1.1" fill="#e2e8f0" class="s1"/>
  <circle cx="810" cy="185" r="1.3" fill="#c9d1d9" class="s3"/>
  <circle cx="860" cy="200" r="0.9" fill="#a78bfa" class="s5"/>
  <circle cx="25" cy="140" r="1" fill="#e2e8f0" class="s2"/>
  <circle cx="885" cy="70" r="1.2" fill="#c9d1d9" class="s4"/>

  <!-- Stars - Layer 3 (bright accents with glow) -->
  <circle cx="100" cy="55" r="2" fill="#a855f7" filter="url(#starGlow)" class="s1"/>
  <circle cx="250" cy="175" r="1.8" fill="#7c3aed" filter="url(#starGlow)" class="s5"/>
  <circle cx="700" cy="60" r="2.2" fill="#a855f7" filter="url(#starGlow)" class="s3"/>
  <circle cx="820" cy="165" r="1.7" fill="#7c3aed" filter="url(#starGlow)" class="s2"/>
  <circle cx="50" cy="205" r="1.5" fill="#a855f7" filter="url(#starGlow)" class="s4"/>

  <!-- Pleiades cluster (small group of bright stars) -->
  <circle cx="760" cy="35" r="1.8" fill="#c4b5fd" filter="url(#starGlow)" class="s1"/>
  <circle cx="775" cy="28" r="1.4" fill="#ddd6fe" filter="url(#starGlow)" class="s3"/>
  <circle cx="768" cy="45" r="1.2" fill="#c4b5fd" filter="url(#starGlow)" class="s5"/>
  <circle cx="782" cy="40" r="1.6" fill="#ddd6fe" filter="url(#starGlow)" class="s2"/>
  <circle cx="753" cy="38" r="1" fill="#ede9fe" filter="url(#starGlow)" class="s4"/>
  <circle cx="770" cy="52" r="0.9" fill="#c4b5fd" filter="url(#starGlow)" class="s1"/>
  <circle cx="788" cy="32" r="1.1" fill="#ddd6fe" filter="url(#starGlow)" class="s3"/>

  <!-- Bottom stars -->
  <circle cx="200" cy="200" r="1" fill="#c9d1d9" class="s4"/>
  <circle cx="350" cy="205" r="0.8" fill="#e2e8f0" class="s1"/>
  <circle cx="500" cy="195" r="1.1" fill="#a78bfa" class="s3"/>
  <circle cx="600" cy="210" r="0.9" fill="#c9d1d9" class="s5"/>
  <circle cx="720" cy="200" r="1.2" fill="#e2e8f0" class="s2"/>

  <!-- Shooting star -->
  <g class="shoot" transform="translate(100, 30)">
    <line x1="0" y1="0" x2="-20" y2="-6" stroke="url(#shootGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#fff"/>
  </g>
  <linearGradient id="shootGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>

  <!-- Main title -->
  <text x="450" y="100" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="12" fill="#f0e6ff" filter="url(#textGlow)">SHAK-SHAT</text>

  <!-- Decorative line -->
  <line x1="280" y1="118" x2="620" y2="118" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" letter-spacing="4" fill="#c4b5fd" filter="url(#subtitleGlow)">AGENTIC ENGINEER  ·  TRADING SYSTEMS ARCHITECT  ·  BUILDER OF LIVING AI</text>

  <!-- Small decorative stars around title -->
  <text x="235" y="95" font-size="8" fill="#a855f7" class="s2">✦</text>
  <text x="665" y="95" font-size="8" fill="#a855f7" class="s4">✦</text>
  <text x="250" y="152" font-size="6" fill="#7c3aed" class="s1">✦</text>
  <text x="650" y="152" font-size="6" fill="#7c3aed" class="s3">✦</text>
</svg>