  <circle cx="100" cy="40" r="1" fill="#a78bfa" class="ft1"/>
  <circle cx="250" cy="55" r="1.2" fill="#c4b5fd" filter="url(#fsg)" class="ft2"/>
  <circle cx="400" cy="45" r="0.8" fill="#a78bfa" class="ft3"/>
  <circle cx="550" cy="60" r="1.1" fill="#c4b5fd" filter="url(#fsg)" class="ft1"/>
  <circle cx="700" cy="42" r="0.9" fill="#a78bfa" class="ft2"/>
  <circle cx="800" cy="50" r="1.3" fill="#c4b5fd" filter="url(#fsg)" class="ft3"/>
  <circle cx="170" cy="70" r="0.7" fill="#a78bfa" class="ft2"/>
  <circle cx="450" cy="35" r="1" fill="#c4b5fd" filter="url(#fsg)" class="ft1"/>
  <circle cx="620" cy="68" r="0.8" fill="#a78bfa" class="ft3"/>
  <circle cx="340" cy="72" r="1.1" fill="#c4b5fd" filter="url(#fsg)" class="ft2"/>

  <!-- End text -->
  <text x="450" y="90" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="300" letter-spacing="6" fill="#7c3aed" opacity="0.5">✦  END OF TRANSMISSION  ✦</text>

  <text x="450" y="110" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#4b5563" opacity="0.4">Signal origin: Pleiades Cluster · Coordinates: 03h 47m · Declination: +24° 07′</text>
