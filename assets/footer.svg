    <style>
      @keyframes ft1{0%,100%{opacity:.2}50%{opacity:.8}}
      @keyframes ft2{0%,100%{opacity:.3}50%{opacity:.9}}
      @keyframes ft3{0%,100%{opacity:.15}50%{opacity:.7}}
      .ft1{animation:ft1 3s ease-in-out infinite}
      .ft2{animation:ft2 4.5s ease-in-out infinite}
      .ft3{animation:ft3 3.8s ease-in-out infinite}
    </style>
  </defs>

  <rect width="900" height="120" fill="url(#fg)" rx="0 0 10 10"/>

  <!-- Decorative line -->
  <line x1="200" y1="25" x2="700" y2="25" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>

