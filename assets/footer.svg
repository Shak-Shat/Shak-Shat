<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020209" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0d0d2b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <filter id="fsg">
      <feGaussianBlur stdDeviation="1.5"/>
