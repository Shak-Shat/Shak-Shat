  <circle cx="250" cy="240" r="4" fill="#a855f7" filter="url(#sg)" class="p2"/>
  <circle cx="250" cy="240" r="2.5" fill="#e9d5ff"/>
  <text x="250" y="258" class="label">Next.js</text>

  <circle cx="170" cy="270" r="4" fill="#a855f7" filter="url(#sg)" class="p3"/>
  <circle cx="170" cy="270" r="2.5" fill="#e9d5ff"/>
  <text x="170" y="288" class="label">HTML/CSS</text>

  <circle cx="80" cy="240" r="3.5" fill="#a855f7" filter="url(#sg)" class="p1"/>
  <circle cx="80" cy="240" r="2" fill="#e9d5ff"/>
  <text x="80" y="258" class="label">Express</text>

  <circle cx="280" cy="160" r="3.5" fill="#a855f7" filter="url(#sg)" class="p2"/>
  <circle cx="280" cy="160" r="2" fill="#e9d5ff"/>
  <text x="280" y="148" class="label">Tailwind</text>

