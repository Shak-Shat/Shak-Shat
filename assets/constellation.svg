  <text x="490" y="62" class="cluster-label" fill="#3b82f6" opacity="0.6">NEBULA BETA</text>

  <!-- Constellation lines -->
  <line x1="470" y1="120" x2="530" y2="150" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="530" y1="150" x2="510" y2="210" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="510" y1="210" x2="440" y2="200" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="440" y1="200" x2="470" y2="120" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="510" y1="210" x2="560" y2="260" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="440" y1="200" x2="420" y2="260" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="530" y1="150" x2="580" y2="180" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>

  <!-- Stars (skills) -->
  <circle cx="470" cy="120" r="5.5" fill="#3b82f6" filter="url(#sg)" class="p2"/>
  <circle cx="470" cy="120" r="3" fill="#dbeafe"/>
  <text x="470" y="108" class="label">Python</text>

  <circle cx="530" cy="150" r="5" fill="#3b82f6" filter="url(#sg)" class="p3"/>
  <circle cx="530" cy="150" r="3" fill="#dbeafe"/>
  <text x="530" y="138" class="label">TensorFlow</text>

  <circle cx="510" cy="210" r="5" fill="#3b82f6" filter="url(#sg)" class="p1"/>
  <circle cx="510" cy="210" r="3" fill="#dbeafe"/>
  <text x="510" y="228" class="label">PyTorch</text>

  <circle cx="440" cy="200" r="4.5" fill="#3b82f6" filter="url(#sg)" class="p2"/>
  <circle cx="440" cy="200" r="2.5" fill="#dbeafe"/>
  <text x="440" y="188" class="label">Pandas</text>

  <circle cx="560" cy="260" r="4" fill="#3b82f6" filter="url(#sg)" class="p3"/>
  <circle cx="560" cy="260" r="2.5" fill="#dbeafe"/>
  <text x="560" y="278" class="label">LLMs</text>

  <circle cx="420" cy="260" r="4" fill="#3b82f6" filter="url(#sg)" class="p1"/>
  <circle cx="420" cy="260" r="2.5" fill="#dbeafe"/>
