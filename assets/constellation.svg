<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <radialGradient id="cbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="nebA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="sg2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      @keyframes p1{0%,100%{opacity:.6}50%{opacity:1}}
      @keyframes p2{0%,100%{opacity:.5}50%{opacity:.95}}
      @keyframes p3{0%,100%{opacity:.7}50%{opacity:1}}
      .p1{animation:p1 3s ease-in-out infinite}
      .p2{animation:p2 4s ease-in-out infinite}
      .p3{animation:p3 3.5s ease-in-out infinite}
      .label{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;fill:#c9d1d9;text-anchor:middle}
      .cluster-label{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-anchor:middle}
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#cbg)" rx="10"/>

  <!-- Section title -->
  <text x="450" y="30" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="#7c3aed" opacity="0.8">✦  S T A R   S Y S T E M S  ✦</text>

  <!-- ============ NEBULA ALPHA — Web Dev (Left) ============ -->
  <ellipse cx="180" cy="200" rx="170" ry="140" fill="url(#nebA)"/>
  <text x="180" y="62" class="cluster-label" fill="#a855f7" opacity="0.6">NEBULA ALPHA</text>

  <!-- Constellation lines -->
  <line x1="140" y1="120" x2="220" y2="140" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="220" y1="140" x2="200" y2="200" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="200" y1="200" x2="130" y2="190" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="130" y1="190" x2="140" y2="120" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="200" y1="200" x2="250" y2="240" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="250" y1="240" x2="170" y2="270" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="130" y1="190" x2="80" y2="240" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
  <line x1="220" y1="140" x2="280" y2="160" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>

  <!-- Stars (skills) -->
  <circle cx="140" cy="120" r="5" fill="#a855f7" filter="url(#sg)" class="p1"/>
  <circle cx="140" cy="120" r="3" fill="#e9d5ff"/>
  <text x="140" y="108" class="label">JavaScript</text>

  <circle cx="220" cy="140" r="5" fill="#a855f7" filter="url(#sg)" class="p2"/>
  <circle cx="220" cy="140" r="3" fill="#e9d5ff"/>
  <text x="220" y="128" class="label">TypeScript</text>

  <circle cx="200" cy="200" r="6" fill="#a855f7" filter="url(#sg)" class="p3"/>
  <circle cx="200" cy="200" r="3.5" fill="#f0e6ff"/>
