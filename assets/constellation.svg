  <!-- ============ NEBULA GAMMA — Creative (Right) ============ -->
  <ellipse cx="770" cy="200" rx="130" ry="140" fill="url(#nebC)"/>
  <text x="770" y="62" class="cluster-label" fill="#14b8a6" opacity="0.6">NEBULA GAMMA</text>

  <!-- Constellation lines -->
  <line x1="750" y1="130" x2="810" y2="160" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>
  <line x1="810" y1="160" x2="790" y2="220" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>
  <line x1="790" y1="220" x2="730" y2="210" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>
  <line x1="730" y1="210" x2="750" y2="130" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>
  <line x1="790" y1="220" x2="770" y2="280" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>
  <line x1="730" y1="210" x2="710" y2="270" stroke="#14b8a6" stroke-width="0.4" opacity="0.3"/>

  <!-- Stars (skills) -->
  <circle cx="750" cy="130" r="5" fill="#14b8a6" filter="url(#sg)" class="p3"/>
  <circle cx="750" cy="130" r="3" fill="#ccfbf1"/>
  <text x="750" y="118" class="label">Writing</text>

  <circle cx="810" cy="160" r="5" fill="#14b8a6" filter="url(#sg)" class="p1"/>
  <circle cx="810" cy="160" r="3" fill="#ccfbf1"/>
  <text x="810" y="148" class="label">Design</text>

  <circle cx="790" cy="220" r="5.5" fill="#14b8a6" filter="url(#sg)" class="p2"/>
  <circle cx="790" cy="220" r="3.5" fill="#ccfbf1"/>
  <text x="790" y="238" class="label">Invention</text>

  <circle cx="730" cy="210" r="4.5" fill="#14b8a6" filter="url(#sg)" class="p3"/>
  <circle cx="730" cy="210" r="2.5" fill="#ccfbf1"/>
  <text x="730" y="198" class="label">Storytelling</text>

  <circle cx="770" cy="280" r="4" fill="#14b8a6" filter="url(#sg)" class="p1"/>
  <circle cx="770" cy="280" r="2.5" fill="#ccfbf1"/>
  <text x="770" y="298" class="label">UX</text>

  <circle cx="710" cy="270" r="4" fill="#14b8a6" filter="url(#sg)" class="p2"/>
  <circle cx="710" cy="270" r="2.5" fill="#ccfbf1"/>
  <text x="710" y="288" class="label">Ideation</text>

  <!-- Faint connecting lines between clusters -->
  <line x1="280" y1="160" x2="440" y2="200" stroke="#6d28d9" stroke-width="0.3" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="580" y1="180" x2="730" y2="210" stroke="#0d9488" stroke-width="0.3" opacity="0.15" stroke-dasharray="4 4"/>

  <!-- Background ambient stars -->
  <circle cx="350" cy="100" r="0.8" fill="#4b5563" opacity="0.4"/>
  <circle cx="380" cy="320" r="0.6" fill="#4b5563" opacity="0.3"/>
  <circle cx="650" cy="90" r="0.7" fill="#4b5563" opacity="0.35"/>
  <circle cx="620" cy="340" r="0.5" fill="#4b5563" opacity="0.3"/>
  <circle cx="30" cy="350" r="0.8" fill="#4b5563" opacity="0.3"/>
  <circle cx="870" cy="350" r="0.6" fill="#4b5563" opacity="0.35"/>

  <!-- Footer line -->
  <line x1="100" y1="360" x2="800" y2="360" stroke="#4b5563" stroke-width="0.3" opacity="0.2"/>
</svg>